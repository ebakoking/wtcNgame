<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Rage Predictor - wtcN Edition</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#000;font-family:'Nunito',sans-serif;overflow:hidden;user-select:none}

/* SPLASH */
#splash{position:fixed;inset:0;background:radial-gradient(ellipse,#1a0a2e,#0a0a0f 70%);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.6s}
#splash.out{opacity:0;pointer-events:none}
.sp-t{font-family:'Bangers',cursive;font-size:clamp(36px,9vw,56px);color:#ff4655;letter-spacing:3px;text-shadow:4px 4px 0 #000,0 0 40px rgba(255,70,85,0.4)}
.sp-s{font-size:clamp(12px,3vw,16px);color:#9147ff;font-weight:700;letter-spacing:6px;margin-bottom:28px}
.sp-btn{background:#ff4655;color:#fff;border:none;padding:16px 48px;border-radius:14px;font-size:20px;font-weight:900;cursor:pointer;font-family:'Nunito';text-transform:uppercase;transition:transform 0.2s;box-shadow:0 4px 20px rgba(255,70,85,0.4)}
.sp-btn:hover{transform:scale(1.08)}
.sp-i{margin-top:16px;font-size:11px;color:#555;text-align:center;line-height:1.6}

/* GAME */
#game{display:none;position:fixed;inset:0}
#game.shaking{animation:bigShake 0.1s infinite}
@keyframes bigShake{
0%,100%{transform:translate(0,0) rotate(0)}
10%{transform:translate(-10px,6px) rotate(-1deg)}
20%{transform:translate(8px,-8px) rotate(1.5deg)}
30%{transform:translate(-12px,4px) rotate(-0.5deg)}
40%{transform:translate(10px,-6px) rotate(1deg)}
50%{transform:translate(-6px,10px) rotate(-1.5deg)}
60%{transform:translate(12px,-4px) rotate(0.5deg)}
70%{transform:translate(-8px,8px) rotate(-1deg)}
80%{transform:translate(6px,-10px) rotate(1.5deg)}
90%{transform:translate(-4px,6px) rotate(-0.5deg)}
}

/* BG IMAGES - full quality */
.bg{position:absolute;inset:0;background-size:cover;background-position:center top;transition:opacity 0.5s;z-index:1;image-rendering:auto}
#bgG{opacity:1}
#bgR{opacity:0}

/* TOP BAR */
.top{position:absolute;top:0;left:0;right:0;height:38px;background:linear-gradient(180deg,rgba(0,0,0,0.85) 0%,transparent 100%);z-index:30;display:flex;align-items:center;padding:0 12px;justify-content:space-between}
.t-l{font-family:'Bangers',cursive;font-size:clamp(15px,4vw,22px);color:#ff4655}
.t-r{display:flex;align-items:center;gap:10px;font-size:clamp(9px,2.2vw,12px);color:#bbb}
.t-tag{background:rgba(38,38,44,0.9);padding:2px 8px;border-radius:4px;font-size:clamp(8px,1.8vw,10px);color:#fdcb6e;font-weight:700}
.t-sc{color:#00b894;font-weight:900;font-size:clamp(12px,3vw,16px)}

/* PROGRESS */
.prog{position:absolute;top:38px;left:0;right:0;height:14px;background:rgba(0,0,0,0.6);z-index:30;display:flex;align-items:center;justify-content:center;gap:2px}
.pd{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,0.08);transition:all 0.3s}
.pd.ok{background:#00b894}.pd.no{background:#e24b4a}.pd.cur{background:#9147ff;box-shadow:0 0 6px #9147ff}

/* CHAT PANEL */
.chat{position:absolute;top:52px;right:2%;width:clamp(155px,36%,280px);bottom:52px;z-index:30;background:rgba(24,24,27,0.93);border:2px solid rgba(100,100,100,0.4);border-radius:8px;display:flex;flex-direction:column;overflow:hidden;backdrop-filter:blur(6px);transition:opacity 0.3s}
.chat.hide{opacity:0;pointer-events:none}
.c-hd{background:rgba(14,14,16,0.95);padding:5px 8px;display:flex;align-items:center;gap:4px;border-bottom:1px solid #2a2a2e}
.c-dot{width:6px;height:6px;border-radius:50%;background:#e24b4a;animation:pls 1.5s infinite}
@keyframes pls{0%,100%{opacity:1}50%{opacity:0.4}}
.c-t{font-size:clamp(9px,2vw,12px);font-weight:700;color:#efeff1}
.c-pr{padding:5px 8px;text-align:center;font-size:clamp(8px,1.8vw,11px);color:#fdcb6e;font-weight:700;border-bottom:1px solid #2a2a2e}
.c-ms{flex:1;padding:4px;overflow-y:auto;display:flex;flex-direction:column;gap:3px}
.m{padding:clamp(5px,1.2vw,8px);border-radius:6px;cursor:pointer;transition:all 0.2s;border:1.5px solid transparent;font-size:clamp(9px,2vw,12px);color:#efeff1;background:rgba(38,38,44,0.9);display:flex;gap:4px;align-items:flex-start;line-height:1.3}
.m:hover{border-color:#9147ff;background:rgba(50,50,65,0.95)}
.m:active{transform:scale(0.97)}
.m.lk{pointer-events:none}
.m.ok{background:rgba(26,58,26,0.95);border-color:#00b894;color:#a5d6a7}
.m.no{background:rgba(58,26,26,0.95);border-color:#e24b4a;color:#ef9a9a}
.m.off{opacity:0.12;pointer-events:none}
.m.rv{border-color:#9147ff;background:rgba(45,31,94,0.95)}
.m-u{font-weight:700;white-space:nowrap;font-size:clamp(8px,1.6vw,10px);flex-shrink:0}

/* ANALYSIS */
.anl{position:absolute;inset:0;z-index:35;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.4s}
.anl.show{opacity:1}
.anl-box{background:rgba(0,0,0,0.88);padding:18px 30px;border-radius:16px;text-align:center;border:2px solid #9147ff;box-shadow:0 0 30px rgba(145,71,255,0.3)}
.anl-txt{font-size:clamp(13px,3.5vw,18px);color:#9147ff;font-weight:800}

/* SPEECH BUBBLE */
.bbl{position:absolute;top:clamp(54px,14%,90px);left:clamp(6px,2%,16px);max-width:40%;background:rgba(0,0,0,0.92);color:#fff;padding:8px 14px;border-radius:14px;font-size:clamp(9px,2vw,13px);font-weight:700;line-height:1.4;z-index:36;border:2px solid #9147ff;opacity:0;transition:all 0.4s}
.bbl.rage{border-color:#ff4655;color:#ff4655;font-size:clamp(10px,2.2vw,14px)}

/* ===== RAGE EFFECTS ===== */
.fx-vig{position:absolute;inset:0;z-index:15;pointer-events:none;opacity:0;transition:opacity 0.15s}
.fx-vig-inner{position:absolute;inset:0;box-shadow:inset 0 0 150px rgba(255,0,0,0.7)}
.fx-red{position:absolute;inset:0;z-index:2;pointer-events:none;background:rgba(255,0,0,0.18);opacity:0;transition:opacity 0.2s}
.fx-flash{position:absolute;inset:0;z-index:16;pointer-events:none;background:#fff;opacity:0;transition:opacity 0.05s}
.fx-crack{position:absolute;inset:0;z-index:17;pointer-events:none;opacity:0;transition:opacity 0.2s}
.fx-ptcs{position:absolute;inset:0;z-index:25;pointer-events:none;overflow:hidden}
.ptc{position:absolute;font-family:'Bangers',cursive;font-weight:900;opacity:0;pointer-events:none;text-shadow:3px 3px 0 rgba(0,0,0,0.6)}
@keyframes ptcUp{0%{opacity:1;transform:translateY(0) scale(1) rotate(0)}50%{opacity:0.9}100%{opacity:0;transform:translateY(-120px) scale(0.2) rotate(30deg)}}

/* FLYING OBJECTS */
.fly-obj{position:absolute;z-index:22;pointer-events:none;opacity:0}
.fly-kb{width:clamp(60px,15vw,100px);height:clamp(20px,5vw,35px);background:#2d2d2d;border:2px solid #666;border-radius:4px;display:flex;flex-wrap:wrap;gap:1px;padding:2px;align-content:center;justify-content:center}
.fly-kb span{width:5px;height:4px;background:#555;border-radius:1px;display:block}
.fly-ms{width:clamp(16px,4vw,28px);height:clamp(24px,6vw,42px);background:#555;border-radius:8px 8px 4px 4px;border:2px solid #777}
.fly-can{width:clamp(16px,4vw,26px);height:clamp(34px,8vw,52px);background:#c0392b;border-radius:4px 4px 2px 2px;border:2px solid #e74c3c;position:relative}
.fly-can::after{content:'RB';position:absolute;top:30%;left:0;right:0;text-align:center;font-size:clamp(4px,1vw,7px);color:#fff;font-weight:900;background:#1a4a8a;padding:1px 0}
.fly-chair{width:clamp(30px,8vw,50px);height:clamp(40px,10vw,60px);background:#1a1a2e;border-radius:6px;border:2px solid #333}

@keyframes flyKb{
0%{opacity:1;bottom:35%;left:30%;transform:rotate(0)}
30%{opacity:1;bottom:60%;left:15%;transform:rotate(-45deg)}
60%{opacity:1;bottom:75%;left:5%;transform:rotate(-120deg)}
100%{opacity:0;bottom:90%;left:-10%;transform:rotate(-200deg)}
}
@keyframes flyMs{
0%{opacity:1;bottom:35%;right:25%;transform:rotate(0)}
25%{opacity:1;bottom:55%;right:10%;transform:rotate(60deg)}
50%{opacity:1;bottom:70%;right:0%;transform:rotate(180deg)}
100%{opacity:0;bottom:95%;right:-15%;transform:rotate(360deg)}
}
@keyframes flyCan{
0%{opacity:1;bottom:30%;left:8%;transform:rotate(0)}
30%{opacity:1;bottom:50%;left:3%;transform:rotate(-30deg)}
60%{opacity:1;bottom:65%;left:-2%;transform:rotate(-90deg)}
100%{opacity:0;bottom:85%;left:-10%;transform:rotate(-180deg)}
}
@keyframes flyChair{
0%{opacity:0.8;bottom:10%;left:35%;transform:rotate(0) scale(1)}
40%{opacity:0.9;bottom:30%;left:20%;transform:rotate(-15deg) scale(1.1)}
100%{opacity:0;bottom:60%;left:0%;transform:rotate(-45deg) scale(0.6)}
}
@keyframes screenCrack{
0%{opacity:0;transform:scale(0.5)}
20%{opacity:1;transform:scale(1.1)}
100%{opacity:0.8;transform:scale(1)}
}

/* STATE */
.state{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);font-size:clamp(10px,2.5vw,14px);padding:4px 18px;border-radius:12px;background:rgba(0,0,0,0.75);z-index:36;font-weight:700;transition:all 0.3s;white-space:nowrap}

/* RESULT BAR */
.rbar{position:absolute;bottom:0;left:0;right:0;height:48px;background:rgba(0,0,0,0.88);z-index:50;display:flex;align-items:center;justify-content:center;gap:10px;transform:translateY(100%);transition:transform 0.3s}
.rbar.show{transform:translateY(0)}
.rb-t{font-size:clamp(11px,2.5vw,14px);font-weight:700}
.rb-b{background:#9147ff;color:#fff;border:none;padding:8px 22px;border-radius:8px;font-size:clamp(10px,2.2vw,12px);font-weight:700;cursor:pointer;font-family:'Nunito';transition:all 0.2s}
.rb-b:hover{background:#772ce8;transform:scale(1.04)}

/* AD */
#adOv{position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:100;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.3s}
#adOv.show{opacity:1;pointer-events:all}
.ad-bx{background:#1f1f23;border:2px solid #333;border-radius:14px;padding:24px;text-align:center;max-width:280px;width:90%}
.ad-ar{width:100%;height:140px;background:#26262c;border-radius:8px;display:flex;align-items:center;justify-content:center;margin:10px 0;border:1px dashed #444;color:#555;font-size:12px}
.ad-t{font-size:14px;color:#aaa;font-weight:700}
.ad-s{background:#9147ff;color:#fff;border:none;padding:8px 18px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Nunito';margin-top:6px;display:none}

/* FINAL */
#fnOv{position:fixed;inset:0;background:rgba(0,0,0,0.94);z-index:150;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.4s}
#fnOv.show{opacity:1;pointer-events:all}
.fn{text-align:center;color:#efeff1}
.fn h1{font-family:'Bangers',cursive;font-size:clamp(26px,7vw,38px);color:#ff4655}
.fn .sc{font-size:clamp(44px,12vw,64px);font-weight:900;margin:8px 0}
.fn .st{display:flex;justify-content:center;gap:4px;margin:10px 0}
.fn .mg{font-size:clamp(14px,3.5vw,18px);font-weight:800;margin-bottom:18px}
.fn button{background:#ff4655;color:#fff;border:none;padding:12px 36px;border-radius:12px;font-size:15px;font-weight:800;cursor:pointer;font-family:'Nunito';text-transform:uppercase;margin:4px;transition:transform 0.2s}
.fn button:hover{transform:scale(1.05)}
.fn .sh{background:#9147ff;font-size:12px;padding:9px 22px}
</style>
</head>

var CL=['#e24b4a','#9147ff','#00b894','#fdcb6e','#0984e3','#e84393','#00cec9','#ff7675','#6c5ce7','#fd79a8'];
var rnd=0,scr=0,ans=false,adAt=[4,9,14],dotIv;

// Keyboard keys for flying kb
var fkb=document.getElementById('fkb');
for(var i=0;i<24;i++){var k=document.createElement('span');fkb.appendChild(k);}

function startGame(){document.getElementById('splash').classList.add('out');document.getElementById('game').style.display='block';setTimeout(function(){document.getElementById('splash').style.display='none'},600);initDots();load();}
function initDots(){var p=document.getElementById('prog');p.innerHTML='';for(var i=0;i<D.length;i++){var e=document.createElement('div');e.className='pd'+(i===0?' cur':'');e.id='p'+i;p.appendChild(e);}}

function showImg(w){document.getElementById('bgG').style.opacity=w==='g'?'1':'0';document.getElementById('bgR').style.opacity=w==='r'?'1':'0';}

// ===== MEGA RAGE =====
function rageOn(){
  var g=document.getElementById('game');
  // White flash first
  var fl=document.getElementById('fxFlash');
  fl.style.opacity='0.7';
  setTimeout(function(){fl.style.opacity='0'},100);
  // Then shake + effects
  setTimeout(function(){
    g.classList.add('shaking');
    document.getElementById('fxVig').style.opacity='1';
    document.getElementById('fxRed').style.opacity='1';
    // Crack after 0.5s
    setTimeout(function(){document.getElementById('fxCrack').style.opacity='1'},400);
    // Flying objects!
    launchObjects();
    // Particles
    spawnPtc();
    // More particles at 0.5s
    setTimeout(spawnPtc,600);
    // Stop shake after 3s
    setTimeout(function(){g.classList.remove('shaking')},3000);
  },120);
}

function launchObjects(){
  // Keyboard flies top-left
  var kb=document.getElementById('flyKb');
  kb.style.opacity='1';kb.style.animation='flyKb 1.2s ease-out forwards';
  // Mouse flies top-right
  var ms=document.getElementById('flyMs');
  ms.style.opacity='1';ms.style.animation='flyMs 1s ease-out 0.15s forwards';
  // Red Bull flies left
  var can=document.getElementById('flyCan');
  can.style.opacity='1';can.style.animation='flyCan 1.1s ease-out 0.3s forwards';
  // Chair tips back
  var ch=document.getElementById('flyChair');
  ch.style.opacity='0.8';ch.style.animation='flyChair 1.4s ease-out 0.5s forwards';
}

function rageOff(){
  document.getElementById('game').classList.remove('shaking');
  document.getElementById('fxVig').style.opacity='0';
  document.getElementById('fxRed').style.opacity='0';
  document.getElementById('fxFlash').style.opacity='0';
  document.getElementById('fxCrack').style.opacity='0';
  document.getElementById('ptcs').innerHTML='';
  ['flyKb','flyMs','flyCan','flyChair'].forEach(function(id){
    var el=document.getElementById(id);el.style.opacity='0';el.style.animation='none';
  });
}

function spawnPtc(){
  var c=document.getElementById('ptcs');
  var sy=['!!','#@!','%!!','!!!','@#$','!?!','RAGE','***','TILT','WTF','NOOO','AHHH'];
  for(var i=0;i<18;i++){
    var d=document.createElement('div');d.className='ptc';
    d.textContent=sy[Math.floor(Math.random()*sy.length)];
    d.style.left=Math.random()*85+5+'%';
    d.style.top=Math.random()*55+5+'%';
    d.style.color=['#ff4655','#ff8a00','#ff0000','#ffdd00','#ff1744'][Math.floor(Math.random()*5)];
    d.style.fontSize=Math.random()*20+16+'px';
    d.style.animation='ptcUp 2.2s ease-out '+(i*0.06)+'s forwards';
    c.appendChild(d);
  }
}

// === ANALYSIS ===
function showAnalysis(cb){
  var a=document.getElementById('anl');a.classList.add('show');
  var txt=document.getElementById('anlTxt');
  var msgs=['wtcN yorumu okuyor...','Hmm... buna ne diyecek...','Analiz ediliyor...'];
  txt.textContent=msgs[Math.floor(Math.random()*msgs.length)];
  var delay=2500+Math.random()*1500;
  setTimeout(function(){a.classList.remove('show');cb()},delay);
}

// === LOAD ===
function load(){
  if(rnd>=D.length){showFinal();return}
  ans=false;var s=D[rnd];
  document.getElementById('rn').textContent=rnd+1;
  document.getElementById('sc').textContent=scr;
  document.getElementById('tag').textContent=s.g+' - '+s.m;
  document.getElementById('rbar').classList.remove('show');
  document.getElementById('bbl').style.opacity='0';
  rageOff();showImg('g');
  document.getElementById('stxt').style.color='#777';
  document.getElementById('stxt').textContent='Oyuna odaklanmis...';
  for(var i=0;i<D.length;i++){document.getElementById('p'+i).classList.toggle('cur',i===rnd);}
  var cm=document.getElementById('cms');cm.innerHTML='';
  s.o.forEach(function(o,i){
    var d=document.createElement('div');d.className='m';
    var c=CL[Math.floor(Math.random()*CL.length)];
    d.innerHTML='<span class="m-u" style="color:'+c+'">'+o.u+':</span><span>'+o.t+'</span>';
    d.onclick=function(){pick(i)};
    cm.appendChild(d);
  });
}

// === PICK ===
function pick(idx){
  if(ans)return;ans=true;
  var s=D[rnd],ci=-1;s.o.forEach(function(o,i){if(o.r)ci=i});
  var ok=idx===ci;
  showImg('r');
  document.getElementById('stxt').style.color='#fdcb6e';
  document.getElementById('stxt').textContent='Chati okuyor...';
  showAnalysis(function(){
    var els=document.getElementById('cms').children;
    for(var i=0;i<els.length;i++){
      els[i].classList.add('lk');
      if(i===ci)els[i].className='m lk '+(ok?'ok':'rv');
      else if(i===idx&&!ok)els[i].className='m lk no';
      else els[i].className='m lk off';
    }
    var bbl=document.getElementById('bbl'),rb=document.getElementById('rbar'),rt=document.getElementById('rbt');
    rb.classList.add('show');
    if(ok){
      scr++;
      bbl.textContent='"'+s.o[ci].t+'"';bbl.style.opacity='1';bbl.className='bbl rage';
      showImg('g');rageOn();
      document.getElementById('stxt').style.color='#ff4655';document.getElementById('stxt').textContent='RAGE MODE!!!';
      rt.style.color='#a5d6a7';rt.textContent='Dogru! wtcN cildirdi!';
      document.getElementById('p'+rnd).className='pd ok';document.getElementById('sc').textContent=scr;
    }else{
      bbl.textContent='Buna takilmam...';bbl.style.opacity='1';bbl.className='bbl';
      showImg('g');
      document.getElementById('stxt').style.color='#777';document.getElementById('stxt').textContent='Oyuna dondu...';
      rt.style.color='#ef9a9a';rt.textContent='Yanlis! Buna rage gecmez.';
      document.getElementById('p'+rnd).className='pd no';
    }
  });
}

document.getElementById('rbb').onclick=function(){rnd++;if(adAt.indexOf(rnd-1)!==-1&&rnd<D.length){showAd(load)}else load()};

function showAd(cb){var o=document.getElementById('adOv');o.classList.add('show');var t=3;document.getElementById('adS').style.display='none';document.getElementById('adT').textContent=t;var iv=setInterval(function(){t--;document.getElementById('adT').textContent=t;if(t<=0){clearInterval(iv);document.getElementById('adS').style.display='inline-block';document.getElementById('adT').textContent='';}},1000);window._cb=cb;}
function closeAd(){document.getElementById('adOv').classList.remove('show');if(window._cb)window._cb();}

function showFinal(){document.getElementById('fnOv').classList.add('show');document.getElementById('fnSc').textContent=scr+'/20';var st=document.getElementById('fnSt');st.innerHTML='';var n=scr>=20?5:scr>=16?4:scr>=12?3:scr>=8?2:scr>=4?1:0;for(var i=0;i<5;i++){var d=document.createElement('div');d.innerHTML='<svg viewBox="0 0 24 24" width="28" height="28"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 21 12 17.27 5.82 21 7 14.14l-5-4.87 6.91-1.01L12 2z" fill="'+(i<n?'#fdcb6e':'#333')+'" stroke="'+(i<n?'#f39c12':'#444')+'" stroke-width="1"/></svg>';st.appendChild(d);}var mg=document.getElementById('fnMg');if(scr===20){mg.style.color='#a5d6a7';mg.textContent='KUSURSUZ! Gercek rage uzmansin!';}else if(scr>=16){mg.style.color='#a5d6a7';mg.textContent='Harika! wtcN\'i cok iyi taniyorsun!';}else if(scr>=12){mg.style.color='#fdcb6e';mg.textContent='Fena degil! Biraz daha yayin izle.';}else if(scr>=8){mg.style.color='#ff7675';mg.textContent='Tam taniyamamissin.';}else{mg.style.color='#ef9a9a';mg.textContent='wtcN\'i hic tanimiyorsun!';}}
function restart(){rnd=0;scr=0;document.getElementById('fnOv').classList.remove('show');rageOff();initDots();load();}
function share(){var t='RAGE PREDICTOR wtcN Edition - '+scr+'/20!\nSen de dene!';if(navigator.share)navigator.share({title:'Rage Predictor',text:t}).catch(function(){});else navigator.clipboard.writeText(t).then(function(){alert('Kopyalandi!')})}
</script>
